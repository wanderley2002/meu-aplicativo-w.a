<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energia feito com energético</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="container-avisos" style="position: fixed; top: 20px; right: 20px; z-index: 1000;"></div>

    <div id="camada-1-inicio">
        <div class="content-box" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
            
            <video autoplay loop muted playsinline id="video-fundador">
                <source src="./img/WhatsApp Video 2026-04-02 at 17.23.37.mp4" type="video/mp4">
            </video>
            
            <h2 style="color: #ffcc00; margin-top: 10px; font-size: 1.2rem; text-transform: uppercase; font-family: sans-serif;">
                Fundador Wanderley Ariel
            </h2>

            <h1>Bem-vindo, seu viciado em energético!</h1>
            
            <p>Digite seu nome para começar:</p>
            <input type="text" id="user-nome-login" placeholder="Seu nome..." style="padding: 10px; border:none; width: 80%; margin-bottom: 15px; border-radius: 5px;">
            <br>
            <button id="btn-entrar">Entrar</button>
            <p style="margin-top: 15px; font-size: 0.9rem; color: #ccc;">Avalie seus consumos</p>
        </div>
    </div>

    <div id="camada-2-selecao" style="display: none; text-align: center;">
        <h1 style="color: white; margin-top: 50px;">Selecione sua dose:</h1>
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px;">
            <button class="btn-escolha-marca" data-nome="monster">
                <img src="img/energetico-monster.jpg" width="80"><br>Monster
            </button>
            <button class="btn-escolha-marca" data-nome="redbull">
                <img src="img/red-bull.jpg" width="80"><br>Red Bull
            </button>
            <button class="btn-escolha-marca" data-nome="tnt">
                <img src="img/tnt.png" width="80"><br>TNT
            </button>
        </div>
        <br>
        <button id="btn-voltar-para-inicio" class="btn-nav">Voltar ao Início</button>
    </div>

    <div id="camada-3-app" style="display: none; text-align: center; padding-top: 30px;">
        
        <div id="placar-geral" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem;">
            <span style="color: #00ff00;">Monster: <span id="total-monster">0</span></span>
            <span style="color: #00ccff;">Red Bull: <span id="total-redbull">0</span></span>
            <span style="color: #ff0022;">TNT: <span id="total-tnt">0</span></span>
        </div>

        <div id="ranking-amigos" style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; color: white; max-width: 400px; margin-inline: auto;">
            <h4 style="margin: 0 0 10px 0; color: #ffcc00;">🔥 Ranking da Galera</h4>
            <div id="lista-ranking"></div>
        </div>

        <h1 id="titulo-marca-ativa" style="color: white;">Consumo</h1>
        <h2 id="texto-alerta" style="height: 60px; font-weight: bold; font-size: 1.5rem; transition: 0.3s;"></h2>

        <p id="texto-instrucao" style="color: #ccc; font-size: 1.2rem; margin-bottom: 10px; transition: 0.3s;">
            Aperte no energético para adicionar uma lata
        </p>

        <button id="btn-add-lata" style="background: none; border: none; cursor: pointer;">
            <img id="foto-dinamica" src="" width="200">
        </button>

        <div style="margin-top: 15px; color: white;">
            <p style="font-size: 3.5rem; margin: 10px; font-weight: bold;">Total: <span id="num-contador">0</span></p>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button id="btn-voltar-para-marcas" class="btn-nav">Voltar Marcas</button>
                <button id="btn-resetar" style="background: #cc0000; color: white; border:none; padding: 10px; border-radius: 5px; cursor: pointer;">Zerar Tudo</button>
            </div>
        </div>

        <div id="box-chat" style="margin-top: 30px; color: white; max-width: 600px; margin-left: auto; margin-right: auto;">
            <h3>💬 Chat Global (<span id="count-usuarios">0</span> online)</h3>
            
            <div style="display: flex; gap: 10px;">
                <div id="lista-usuarios" style="background: rgba(255,255,255,0.1); width: 30%; height: 150px; overflow-y: auto; padding: 10px; border-radius: 5px; font-size: 0.85rem; color: #00ff00; text-align: left;">
                    <strong>Online:</strong>
                    <div id="nomes-online"></div>
                </div>

                <div id="lista-mensagens" style="background: rgba(0,0,0,0.5); width: 70%; height: 150px; overflow-y: auto; padding: 10px; border-radius: 5px; text-align: left; font-size: 0.9rem;"></div>
            </div>

            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="hidden" id="user-nome"> 
                <input type="text" id="user-msg" placeholder="Mensagem..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none;">
                <button onclick="mandarMensagem()" id="btn-enviar-chat" style="padding: 10px 20px; cursor: pointer;">Enviar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
